name: Godot CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Godot Imported Assets
        uses: actions/cache@v4
        with:
          path: .godot/imported
          # Cache key based on project config and assets to ensure re-import when files change
          key: godot-imported-${{ runner.os }}-${{ hashFiles('project.godot', 'assets/**') }}
          restore-keys: |
            godot-imported-${{ runner.os }}-

      - name: Setup Godot
        run: |
          set -euxo pipefail
          GODOT_VERSION="4.6"
          URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          
          # Robust download with simple 3-attempt retry loop
          for i in {1..3}; do
            if curl -fL "$URL" -o godot.zip; then
              break
            elif [ $i -eq 3 ]; then
              echo "Failed to download Godot after 3 attempts"
              exit 1
            fi
            echo "Download failed, retrying in 5s... ($i/3)"
            sleep 5
          done

          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot
          chmod +x godot

      - name: Import project (headless)
        run: |
          set -euxo pipefail
          # --import verifies the project can be initialized and assets imported without errors
          ./godot --headless --path . --import
          
          # Note: Execution step (running the main scene) is omitted to avoid potential hangs 
          # due to blocking UI logic or infinite loops in headless mode, as Godot 4.x 
          # requires in-game scripts to call quit() for a controlled exit.
